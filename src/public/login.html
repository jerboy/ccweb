<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ccweb - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1a1b26; color: #a9b1d6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { display: flex; align-items: center; justify-content: center; }
    .login-box {
      width: 320px;
      padding: 32px 28px;
      background: #16161e;
      border: 1px solid #292e42;
      border-radius: 12px;
    }
    .login-box h1 {
      font-size: 20px;
      color: #c0caf5;
      margin-bottom: 4px;
    }
    .login-box p {
      font-size: 13px;
      color: #565f89;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #565f89;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      background: #1a1b26;
      border: 1px solid #292e42;
      border-radius: 6px;
      color: #c0caf5;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #7aa2f7; }
    button {
      width: 100%;
      padding: 10px;
      background: #7aa2f7;
      color: #1a1b26;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #89b4fa; }
    button:active { background: #6a8edb; }
    .error {
      display: none;
      font-size: 13px;
      color: #f7768e;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <form class="login-box" method="POST" action="/login" id="login-form">
    <h1>ccweb</h1>
    <p>Web Terminal</p>
    <div class="error" id="error-msg">Invalid username or password</div>
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required autofocus />
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required />
    <button type="submit">Login</button>
  </form>
  <script>
    var form = document.getElementById('login-form');
    var errorMsg = document.getElementById('error-msg');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var fd = new FormData(form);
      var body = new URLSearchParams();
      body.append('username', fd.get('username'));
      body.append('password', fd.get('password'));
      fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString(),
        redirect: 'manual',
      }).then(function (res) {
        if (res.status === 200 || res.type === 'opaqueredirect') {
          window.location.href = '/';
        } else {
          errorMsg.style.display = 'block';
        }
      }).catch(function () {
        errorMsg.style.display = 'block';
      });
    });
  </script>
</body>
</html>
